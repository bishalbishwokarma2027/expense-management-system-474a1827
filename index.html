  <body>
    <div id="root"></div>
    <script>
      (function () {
        var redirectPath = sessionStorage.getItem("spa_redirect_path");
        if (redirectPath && window.location.pathname === "/") {
          sessionStorage.removeItem("spa_redirect_path");
          history.replaceState(null, "", redirectPath);
        }
      })();
    </script>
